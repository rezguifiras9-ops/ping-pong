<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="value" id="playerScore">0</span>
            </div>
            <div class="vs">VS</div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="value" id="computerScore">0</span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Move mouse vertically to control left paddle</p>
            <p>⬆️ ⬇️ Arrow keys (alternative control)</p>
            <p>Computer controls the right paddle</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
